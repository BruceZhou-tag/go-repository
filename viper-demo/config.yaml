server:
  port: 8080
  mode: debug  # debug, release, test
  host: localhost

database:
  driver: mysql  # mysql, postgres
  host: localhost
  port: 3306
  user: root
  password: password
  dbname: blog
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600s

jwt:
  secret: your-secret-key-change-in-production
  expire: 24h
  issuer: blog-system

upload:
  path: ./uploads
  max_size: 10485760  # 10MB
  allowed_types:
    - image/jpeg
    - image/png
    - image/gif
    - image/webp

log:
  level: info  # debug, info, warn, error
  format: json  # json, text
  output: stdout  # stdout, file
  file_path: ./logs/app.log